<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcription Webview</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; padding: 0; background: #0b1020; color: #e8eefc; }
    header { padding: 16px 20px; background: rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    h1 { margin: 0; font-size: 16px; letter-spacing: .2px; }
    .sub { opacity: 0.75; font-size: 12px; margin-top: 4px; }
    .top { display:flex; align-items:center; gap:12px; }
    input[type='search'] { padding: 9px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.35); color:#fff; min-width: 280px; }

    .grid { display:grid; grid-template-columns: 250px 320px 1fr 360px; height: calc(100vh - 64px); }
    .pane { border-right: 1px solid rgba(255,255,255,0.12); display:flex; flex-direction: column; }
    .pane:last-child { border-right:none; border-left: 1px solid rgba(255,255,255,0.12); }
    .scroll { overflow:auto; }
    .section { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.02); display:flex; align-items:center; justify-content: space-between; }
    .section b { font-size: 12px; }
    .muted { opacity: 0.75; font-size: 12px; }
    .card { border-radius: 12px; padding: 12px; margin: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
    .card:hover { background: rgba(255,255,255,0.06); }
    .card.active { border-color: rgba(129, 161, 255, 0.75); box-shadow: 0 0 0 3px rgba(129, 161, 255, 0.16); }
    .blob { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; white-space: pre-wrap; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.10); border-radius: 12px; padding: 12px; margin: 12px; }
    .timeline { border-radius: 12px; padding: 12px; margin: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); }
    .item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed rgba(255,255,255,0.15); }
    .item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Transcription Webview</h1>
      <div class="sub">User &gt; Sessions &gt; Transcript &gt; Summary</div>
    </div>
    <div class="top">
      <input id="query" type="search" placeholder="Search (user/session/transcript/summary)…" />
      <button onclick="window.location.reload()" style="cursor:pointer;border-radius:10px;border:1px solid rgba(255,255,255,0.14);background:rgba(0,0,0,0.35);color:#fff;padding:9px 10px;">Reload</button>
    </div>
  </header>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect, useMemo } = React;

    function getUser(doc) {
      return doc.userName || doc.userId || doc.email || doc.owner || doc.user || 'Unknown user';
    }

    function getSessionLabel(doc) {
      return doc.title || doc.sessionId || doc.conversationId || doc.name || doc._id || 'Session';
    }

    function getTranscript(doc) {
      return doc.transcript || doc.text || doc.runningSummary || doc.content || doc.payload?.text || '';
    }

    function getSummary(doc) {
      return doc.summary || doc.aiSummary || doc.runningSummary || '';
    }

    function getDocKey(doc) {
      return doc._id?.$oid || doc._id?.toString?.() || doc._id || doc.sessionId || doc.conversationId || Math.random().toString();
    }

    function Dashboard() {
      const [allDocs, setAllDocs] = useState([]);
      const [selectedUser, setSelectedUser] = useState(null);
      const [selectedSession, setSelectedSession] = useState(null);
      const [loading, setLoading] = useState(true);

      const fetchDocs = async (q) => {
        setLoading(true);
        const params = new URLSearchParams();
        if (q) params.set('q', q);
        try {
          const res = await fetch(`/api/sessions?${params.toString()}`);
          const data = await res.json();
          setAllDocs(data || []);
          const first = data?.[0] || null;
          const user = first ? getUser(first) : null;
          setSelectedUser(user);
          setSelectedSession(first || null);
        } catch (e) {
          console.error(e);
          setAllDocs([]);
          setSelectedUser(null);
          setSelectedSession(null);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        const search = document.getElementById('query');
        const onInput = (e) => fetchDocs(e.target.value);
        search.addEventListener('input', onInput);
        fetchDocs('');
        return () => search.removeEventListener('input', onInput);
      }, []);

      const { users, sessionsByUser } = useMemo(() => {
        const buckets = new Map();
        for (const doc of allDocs) {
          const user = getUser(doc);
          const arr = buckets.get(user) || [];
          arr.push(doc);
          buckets.set(user, arr);
        }
        const usersList = Array.from(buckets.keys()).map((u) => ({
          id: u,
          count: buckets.get(u)?.length || 0,
        })).sort((a, b) => a.id.localeCompare(b.id));
        return { users: usersList, sessionsByUser: buckets };
      }, [allDocs]);

      const sessionsForSelectedUser = useMemo(() => {
        if (!selectedUser) return [];
        return sessionsByUser.get(selectedUser) || [];
      }, [selectedUser, sessionsByUser]);

      return React.createElement(
        'div',
        { className: 'grid' },

        // Users
        React.createElement(
          'aside',
          { className: 'pane scroll' },
          React.createElement(
            'div',
            { className: 'section' },
            React.createElement('b', null, 'User Name'),
            React.createElement('span', { className: 'muted' }, loading ? 'Loading…' : `${users.length} users`)
          ),
          (users || []).map((u) =>
            React.createElement(
              'div',
              {
                key: u.id,
                className: 'card' + (selectedUser === u.id ? ' active' : ''),
                onClick: () => {
                  setSelectedUser(u.id);
                  setSelectedSession((sessionsByUser.get(u.id) || [])[0] || null);
                },
              },
              React.createElement('div', { style: { fontWeight: 700 } }, u.id),
              React.createElement('div', { className: 'muted' }, `${u.count} sessions`)
            )
          )
        ),

        // Sessions
        React.createElement(
          'aside',
          { className: 'pane scroll' },
          React.createElement(
            'div',
            { className: 'section' },
            React.createElement('b', null, 'Sessions'),
            React.createElement(
              'span',
              { className: 'muted' },
              selectedUser ? `${sessionsForSelectedUser.length} found` : ''
            )
          ),
          selectedUser
            ? (sessionsForSelectedUser || []).map((doc) =>
                React.createElement(
                  'div',
                  {
                    key: getDocKey(doc),
                    className: 'card' + (selectedSession && getDocKey(selectedSession) === getDocKey(doc) ? ' active' : ''),
                    onClick: () => setSelectedSession(doc),
                  },
                  React.createElement('div', { style: { fontWeight: 700 } }, getSessionLabel(doc)),
                  React.createElement('div', { className: 'muted' }, doc.date || doc.createdAt || '')
                )
              )
            : React.createElement('div', { className: 'muted', style: { padding: 12 } }, loading ? 'Loading…' : 'Select a user')
        ),

        // Transcript
        React.createElement(
          'main',
          { className: 'pane scroll' },
          React.createElement(
            'div',
            { className: 'section' },
            React.createElement('b', null, 'Transcript'),
            React.createElement('span', { className: 'muted' }, selectedSession ? getSessionLabel(selectedSession) : '')
          ),
          selectedSession
            ? React.createElement(
                'div',
                { className: 'timeline' },
                React.createElement('div', { className: 'item' },
                  React.createElement('div', { className: 'muted' }, selectedSession.date || selectedSession.createdAt || ''),
                  React.createElement('div', { style: { marginTop: 6 } }, getTranscript(selectedSession)
                )
              )
            )
            : React.createElement('div', { className: 'muted', style: { padding: 12 } }, loading ? 'Loading…' : 'Select a session')
        ),

        // Summary ( + raw doc)
        React.createElement(
          'aside',
          { className: 'pane scroll' },
          React.createElement(
            'div',
            { className: 'section' },
            React.createElement('b', null, 'Summary'),
            React.createElement('span', { className: 'muted' }, 'JSON')
          ),
          selectedSession
            ? React.createElement(
                React.Fragment,
                null,
                React.createElement('div', { className: 'blob' }, getSummary(selectedSession) || 'No summary found'),
                React.createElement('div', { className: 'blob' }, JSON.stringify(selectedSession, null, 2))
              )
            : React.createElement('div', { className: 'muted', style: { padding: 12 } }, loading ? 'Loading…' : 'Select a session')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
  </script>
</body>
</html>
